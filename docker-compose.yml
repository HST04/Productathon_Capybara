version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: hpcl_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hpcl_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hpcl_password}
      POSTGRES_DB: ${POSTGRES_DB:-hpcl_leads}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hpcl_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hpcl_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-hpcl_user}:${POSTGRES_PASSWORD:-hpcl_password}@postgres:5432/${POSTGRES_DB:-hpcl_leads}
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hpcl_worker
    command: python app/worker.py
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-hpcl_user}:${POSTGRES_PASSWORD:-hpcl_password}@postgres:5432/${POSTGRES_DB:-hpcl_leads}
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hpcl_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
